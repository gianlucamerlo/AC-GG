# ============================================================
#  SUONA CON GIGI – Masterclass Configuration File
# ============================================================
# ARCHITETTURA: STRICT EXTERNALIZED CONFIGURATION
# 🧨 ATTENZIONE: Questo file NON contiene valori di default.
# L'applicazione NON si avvierà se le variabili d'ambiente 
# DB_USERNAME, DB_PASSWORD e JWT_SECRET non sono definite.

# ── 1. SERVER CONFIGURATION ─────────────────────────────────
server.port=8080
server.servlet.context-path=/
server.error.include-stacktrace=never

# ── 2. DATASOURCE (MySQL) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/suonacongigi?useSSL=false&serverTimezone=Europe/Rome&allowPublicKeyRetrieval=true

# Configurazione Rigida: Iniezione obbligatoria dall'host
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── 3. JPA / HIBERNATE ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── 4. SECURITY & JWT ───────────────────────────────────────
# Configurazione Rigida: Il segreto deve essere iniettato nel sistema
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── 5. CUSTOM APPLICATION LOGIC ─────────────────────────────
# Configurazione Rigida: Il seeding dei dati è abilitato solo in ambienti di sviluppo
# In produzione, questa proprietà deve essere disabilitata per evitare sovrascritture accidentali
# In ambienti di produzione, assicurarsi che app.db.seed-on-start sia impostato su false
# o, meglio ancora!, rimosso completamente
# Eseguite il seeding manualmente in produzione tramite script dedicati o tool di migrazione come Flyway o Liquibase
# PER USO DIDATTICO
# UNA TANTUM: lasciare app.db.seed-on-start=true per popolare il database con dati di esempio al primo avvio
# Ricordatevi di disabilitare questa funzionalità per i riavvi successivi  (app.db.seed-on-start=false)  
app.db.seed-on-start=false

# ── 6. LOGGING SYSTEM ───────────────────────────────────────
logging.level.it.generation.suonacongigi=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springdoc=INFO

# ── 7. SWAGGER / OPENAPI ────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.operations-sorter=alpha 
springdoc.swagger-ui.tags-sorter=alpha 
springdoc.swagger-ui.models-sorter=alpha 