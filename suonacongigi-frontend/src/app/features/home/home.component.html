<div class="hero-wrapper fade-in">
  <div class="hero-visual">
    <div class="hero-overlay"></div>
    <img src="/images/home-photo.jpg" alt="Rock Concert Background" class="hero-img">
  </div>

  <div class="hero-content">
    <header class="hero-nav">
      <span class="logo-brand">SUONA CON GIGI</span>
      
      <button (click)="ui.openLogin()" class="btn-link">
        <span>GIÀ DELLA BAND?</span> 
        <span class="color-secondary">ACCEDI</span>
      </button>
    </header>

    <main class="hero-main">
      <h1 class="hero-title" data-text="NON_SUONARE_SOLO">
        NON SUONARE<br>SOLO.
      </h1>
      <p class="hero-subtitle">
        La community per chi ha il volume a 11. <br>
        Trova i tuoi soci, organizza il live, spacca il palco.
      </p>
      
      <div class="hero-actions">
        <button (click)="ui.openRegister()" class="btn-neon">
          UNISCITI ALLA BAND
          <span class="btn-flare"></span>
        </button>
      </div>
    </main>

    <footer class="hero-footer">
      <div class="hero-stats">
        <div class="stat-card"><strong>500+</strong> MUSICISTI</div>
        <div class="stat-card"><strong>120</strong> EVENTI LIVE</div>
        <div class="stat-card"><strong>0</strong> SCUSE</div>
      </div>
    </footer>
  </div>
</div>
